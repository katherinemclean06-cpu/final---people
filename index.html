    <link href="https://fonts.googleapis.com/css2?family=Iosevka+Charon+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&family=Raleway:ital,wght@0,100..900;1,100..900&family=Rubik+Wet+Paint&family=Truculenta:opsz,wght@12..72,100..900&display=swap" rel="stylesheet">
  
  <title>Photography Portfolio</title>
  
  <style>
  
    * { box-sizing: border-box; }
    
  body { 
  margin: 0;
  font-family: Arial;
}
    
  a { color: white; }
     
  .header {
  padding-bottom: 50px;
  padding-top: 15px;
  text-align: center;
  background: #854287;
}
  h1 { 
  text-align: center;
  color: #854287;
  font-optical-sizing: auto;
  background-color: white;
  font-size: 95px;
  padding: 40px;
  font-family: "Truculenta", Georgia, serif;
  }
  
  h2 {
  text-align: center;
  color: #854287;
  font-optical-sizing: auto;
  background-color: white;
  font-size: 75px;
  padding: 0px;
  margin: 5px;
  font-family: "Truculenta", Georgia, serif;
  }
    
  nav {
  font-family: "Raleway", sans-serif;
  font-optical-sizing: auto;
  font-size: 25px;
  font-style: normal;
  text-align: center;
  width: 900; 
  margin: 0 auto;
}
  ul{
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
  }
  
  ul li {
  display: block;
  text-align: center;
  padding: 25px;
  float: left;
  }
  
  ul li a {
  text-decoration: none;
  color: white;
  }
  
  nav li a:hover {
  color: gray;
  }
    
  .row {
  display: flex;
  flex-wrap: wrap;
  padding: 0 4px;
}
  
  .column {
  flex: 33%;
  max-width: 33%;
  padding: 0 4px;
}
  
  .img-container {
  width: 100%;
  overflow: hidden;
  margin-top: 8px;
}  
  .img-container img {
  width: 100%;
  height: auto; 
  display: block;
  transition: transform 0.5s ease;
}
  .img-container:hover img {
  transform: scale(1.1);
  filter: brightness(80%);
}
  @media screen and (max-width: 800px) {
  .column {
  flex: 50%;
  max-width: 50%;
    }
  }
    
  @media screen and (max-width: 600px) {
  .column {
  flex: 100%;
  max-width: 100%;
    }
  }
  
  footer {
  font-size: 30px;
  text-align: center;
  background: #854287;
  color: white;
  margin-top: 15px;
  padding-top: 25px;
  padding-bottom: 45px;
  }
    </style>
